<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard - FixMyCity</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #f4f4f4;
  animation: fadePage 0.6s ease;
}

@keyframes fadePage {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-area img {
  height: 65px;
}

.logo-text {
  font-size: 20px;
  font-weight: bold;
}

.logo-slogan {
  font-size: 12px;
  color: #555;
  font-family: Arial;
}

.system-area {
  font-family: Arial;
  font-size: 14px;
}

.logout-btn {
  margin-left: 10px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 40px 20px 20px;
}

.hero h1 {
  font-size: 42px;
  margin: 0;
  letter-spacing: 2px;
}

.hero p {
  font-family: Arial;
  font-size: 15px;
  color: #666;
}

/* Stats */
.stats {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin: 25px;
}

.stat-card {
  background: white;
  width: 200px;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.05);
}

/* Grid */
.main-grid {
  display: flex;
  gap: 30px;
  padding: 30px 50px;
}

.card {
  flex: 1;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 35px rgba(0,0,0,0.12);
}

/* Form */
input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  background: #222;
  color: white;
  cursor: pointer;
}

button:hover {
  background: black;
}

/* Report List */
.report-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-family: Arial;
  font-size: 14px;
  opacity: 0;
  transform: translateY(10px);
  animation: slideUp 0.4s ease forwards;
}

@keyframes slideUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Status dots */
.status-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
  animation: pulse 1.5s infinite;
}

.pending-dot { background: red; }
.resolved-dot { background: green; }
.inprogress-dot { background: orange; }

@keyframes pulse {
  0% { box-shadow: 0 0 0px currentColor; }
  50% { box-shadow: 0 0 12px currentColor; }
  100% { box-shadow: 0 0 0px currentColor; }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo-area">
    <img src="logo.png">
    <div>
      <div class="logo-text">FixMyCity</div>
      <div class="logo-slogan">SEE IT. SNAP IT. FIX IT.</div>
    </div>
  </div>
  <div class="system-area">
    ● System Online
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="hero">
  <h1>REPORT. TRACK. FIX.</h1>
  <p>AI-powered civic infrastructure reporting platform.</p>
</div>

<div class="stats">
  <div class="stat-card">
    <h2 id="totalReports">0</h2>
    <div>Total Reports</div>
  </div>
  <div class="stat-card">
    <h2 id="pendingReports">0</h2>
    <div>Pending</div>
  </div>
  <div class="stat-card">
    <h2 id="resolvedReports">0</h2>
    <div>Resolved</div>
  </div>
</div>

<div class="main-grid">

  <div class="card">
    <h3>Submit Report</h3>
    <form id="complaintForm" enctype="multipart/form-data">
      <input type="file" name="image" required>
      <input type="text" name="latitude" placeholder="Latitude" required>
      <input type="text" name="longitude" placeholder="Longitude" required>
      <button type="button" onclick="getLocation()">Auto Detect Location</button>
      <input type="text" name="areaName" placeholder="Area Name" required>

      <select name="damageType" required>
        <option value="">Select Damage Type</option>
        <option>Pothole</option>
        <option>Bridge Crack</option>
        <option>Drainage Block</option>
      </select>

      <select name="severity" required>
        <option value="">Select Severity</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <button type="submit">Submit</button>
    </form>
  </div>

  <div class="card">
    <h3>Live Reports</h3>
    <div id="reportsList"></div>
  </div>

</div>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(position) {
        document.querySelector("input[name='latitude']").value =
          position.coords.latitude;

        document.querySelector("input[name='longitude']").value =
          position.coords.longitude;
      },
      function() {
        alert("Location permission denied.");
      }
    );
  }
}

const form = document.getElementById("complaintForm");
const reportsList = document.getElementById("reportsList");

function animateCounter(id, endValue) {
  const element = document.getElementById(id);
  let start = 0;
  const duration = 600;
  const increment = endValue / (duration / 20);

  const counter = setInterval(() => {
    start += increment;
    if (start >= endValue) {
      element.textContent = endValue;
      clearInterval(counter);
    } else {
      element.textContent = Math.floor(start);
    }
  }, 20);
}

async function loadComplaints() {
  const res = await fetch("http://localhost:5000/complaint");
  const data = await res.json();

  reportsList.innerHTML = "";

  data.forEach(c => {
    let dotClass = "pending-dot";
    if (c.status === "Resolved") dotClass = "resolved-dot";
    if (c.status === "InProgress") dotClass = "inprogress-dot";

    reportsList.innerHTML += `
      <div class="report-item">
        <span class="status-dot ${dotClass}"></span>
        <strong>${c.damageType}</strong> - ${c.areaName}
        <span style="float:right">${c.status || "Pending"}</span>
      </div>
    `;
  });

  animateCounter("totalReports", data.length);
  animateCounter("pendingReports",
    data.filter(c => c.status !== "Resolved").length);
  animateCounter("resolvedReports",
    data.filter(c => c.status === "Resolved").length);
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(form);

  await fetch("http://localhost:5000/complaint", {
    method: "POST",
    body: formData
  });

  form.reset();
  loadComplaints();
});

loadComplaints();
</script>

</body>
</html>
